apiVersion: apps/v1
kind: Deployment
metadata:
  name: archnet-demo
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: archnet-demo
  template:
    metadata:
      labels:
        app: archnet-demo
    spec:
      containers:
      - name: nginx
        image: nginx:stable
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: archnet-demo
  namespace: default
spec:
  selector:
    app: archnet-demo
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
